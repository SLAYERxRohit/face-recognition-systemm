<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viesta - The Face Recognition App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Floating Glass Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-viesta">
        <div class="container"> 
            <!-- logo & brand -->
            <a class="navbar-brand" href="/">
                <img class="img-fluid" src="/static/images/logo.svg" alt="Viesta Logo" width="40" height="40">
                <span>Viesta</span>
            </a>

            <!-- toggle button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#viestaNavbar" aria-controls="viestaNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- items -->
            <div class="collapse navbar-collapse justify-content-end" id="viestaNavbar">
                <div class="navbar-nav align-items-center gap-2">
                    <a class="nav-link nav-item" href="/">Home</a>
                    <a class="nav-link nav-item" href="/app/">How it Works</a>
                    <a class="nav-item btn btn-viesta-primary px-3 py-2 ms-lg-2" href="/app/gender/"><i class="bi bi-cpu me-2"></i>Launch App</a>
                </div>
            </div>
        </div> 
    </nav>

    <!-- Main Content wrapper -->
    <main class="py-4">
        {% block bodyblock %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="viesta-footer">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 Viesta. Powered by Advanced Face Recognition Pipelines.</p>
            <p class="mb-0 text-muted" style="font-size: 0.8rem;">
                Built with OpenCV, Haar Cascades, Principal Component Analysis (PCA), Support Vector Machines (SVM), and Flask.
            </p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
